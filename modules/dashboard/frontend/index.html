<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Infrastructure Status — Multi-Environment Platform</title>
<style>
  :root {
    --bg:        #0d1117;
    --card:      #161b22;
    --border:    #30363d;
    --text:      #c9d1d9;
    --muted:     #8b949e;
    --accent:    #58a6ff;
    --green:     #3fb950;
    --green-bg:  #0d2818;
    --amber:     #d29922;
    --amber-bg:  #2d2210;
    --red:       #f85149;
    --red-bg:    #2d1011;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 2.5rem 1.5rem;
    min-height: 100vh;
  }

  .wrap {
    max-width: 920px;
    margin: 0 auto;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    gap: 1rem;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .subtitle {
    color: var(--muted);
    font-size: 13px;
    margin-top: 4px;
  }

  .meta {
    text-align: right;
    font-size: 12px;
    color: var(--muted);
  }

  button#refresh {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 6px;
    transition: border-color 0.15s;
  }
  button#refresh:hover { border-color: var(--accent); }
  button#refresh:active { transform: scale(0.98); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem;
  }

  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }

  .env-name {
    font-size: 16px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }
  .pill.healthy  { background: var(--green-bg); color: var(--green); }
  .pill.warning  { background: var(--amber-bg); color: var(--amber); }
  .pill.critical { background: var(--red-bg);   color: var(--red); }
  .pill.unknown  { background: #1f242c; color: var(--muted); }

  .pill::before {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
  }

  .metrics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .metric {
    background: #0d1117;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.6rem 0.75rem;
  }

  .metric-label {
    font-size: 10.5px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .metric-value {
    font-family: "SF Mono", Consolas, Monaco, monospace;
    font-size: 16px;
    font-weight: 600;
    margin-top: 3px;
  }

  .metric-value.alert { color: var(--red); }
  .metric-value.ok    { color: var(--text); }

  .deploy-by {
    font-size: 10.5px;
    color: var(--muted);
    margin-top: 2px;
  }

  footer {
    margin-top: 2rem;
    font-size: 11.5px;
    color: var(--muted);
    text-align: center;
  }

  .error-banner {
    background: var(--amber-bg);
    border: 1px solid var(--amber);
    color: var(--amber);
    font-size: 12.5px;
    padding: 0.6rem 1rem;
    border-radius: 6px;
    margin-bottom: 1.25rem;
    display: none;
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div>
      <h1>Infrastructure status</h1>
      <div class="subtitle">Multi-Environment Platform &middot; dev / stage / prod</div>
    </div>
    <div class="meta">
      <div>Updated <span id="updated-time">—</span></div>
      <button id="refresh">Refresh</button>
    </div>
  </header>

  <div class="error-banner" id="error-banner">
    Showing sample data — could not reach the status API.
  </div>

  <div class="grid" id="env-grid"></div>

  <footer>
    Refreshes every 30s &middot; Lambda + API Gateway + CloudWatch + DynamoDB, provisioned with Terraform
  </footer>
</div>

<script>
// Replaced automatically by scripts/deploy_dashboard.sh after `terraform apply`.
// Until then, or if the API is unreachable, the dashboard falls back to mock data.
const API_URL = "__API_URL__/status";
const REFRESH_INTERVAL_MS = 30000;

const MOCK_DATA = {
  generated_at: new Date().toISOString(),
  environments: {
    dev: {
      status: "healthy",
      alarms: { ok: 5, alarm: 0, insufficient: 1 },
      tag_compliance_pct: 100,
      resource_count: 12,
      last_deployed: new Date(Date.now() - 2 * 3600 * 1000).toISOString(),
      last_deployed_by: "github-actions"
    },
    stage: {
      status: "healthy",
      alarms: { ok: 6, alarm: 0, insufficient: 0 },
      tag_compliance_pct: 92,
      resource_count: 18,
      last_deployed: new Date(Date.now() - 26 * 3600 * 1000).toISOString(),
      last_deployed_by: "github-actions"
    },
    prod: {
      status: "warning",
      alarms: { ok: 7, alarm: 1, insufficient: 0 },
      tag_compliance_pct: 100,
      resource_count: 24,
      last_deployed: new Date(Date.now() - 3 * 24 * 3600 * 1000).toISOString(),
      last_deployed_by: "github-actions"
    }
  }
};

function relTime(iso) {
  if (!iso) return "never";
  const diffMs = Date.now() - new Date(iso).getTime();
  const mins = Math.round(diffMs / 60000);
  if (mins < 60) return mins + "m ago";
  const hours = Math.round(mins / 60);
  if (hours < 24) return hours + "h ago";
  return Math.round(hours / 24) + "d ago";
}

function metric(label, value, cls) {
  return '<div class="metric">' +
    '<div class="metric-label">' + label + '</div>' +
    '<div class="metric-value ' + (cls || "ok") + '">' + value + '</div>' +
  '</div>';
}

function renderCard(name, d) {
  const status = d.status || "unknown";
  const alarmText = d.alarms
    ? (d.alarms.alarm > 0 ? d.alarms.alarm + " firing" : d.alarms.ok + " ok")
    : "—";
  const alarmCls = (d.alarms && d.alarms.alarm > 0) ? "alert" : "ok";

  return (
    '<div class="card">' +
      '<div class="card-head">' +
        '<span class="env-name">' + name + '</span>' +
        '<span class="pill ' + status + '">' + status + '</span>' +
      '</div>' +
      '<div class="metrics">' +
        metric("Alarms", alarmText, alarmCls) +
        metric("Tags ok", (d.tag_compliance_pct ?? "—") + "%") +
        metric("Resources", d.resource_count ?? "—") +
        metric("Deployed", relTime(d.last_deployed)) +
      '</div>' +
      (d.last_deployed_by ? '<div class="deploy-by">by ' + d.last_deployed_by + '</div>' : '') +
    '</div>'
  );
}

function render(data) {
  const grid = document.getElementById("env-grid");
  grid.innerHTML = Object.entries(data.environments)
    .map(([name, d]) => renderCard(name, d))
    .join("");
  document.getElementById("updated-time").textContent =
    new Date(data.generated_at).toLocaleTimeString();
}

async function fetchStatus() {
  const banner = document.getElementById("error-banner");
  try {
    const res = await fetch(API_URL, { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    banner.style.display = "none";
    return await res.json();
  } catch (e) {
    console.warn("Falling back to mock data:", e.message);
    banner.style.display = "block";
    return MOCK_DATA;
  }
}

async function refresh() {
  const data = await fetchStatus();
  render(data);
}

document.getElementById("refresh").addEventListener("click", refresh);
refresh();
setInterval(refresh, REFRESH_INTERVAL_MS);
</script>

</body>
</html>
